<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow,noarchive"><meta name="description" content="Primary-source interactive analysis of Nasdaq's business model, segment economics, growth strategy and Digital Assets expansion."><title>Nasdaq Business Model & Digital Assets Strategy</title><style>
:root{--bg:#071014;--panel:#0d191e;--panel2:#112229;--line:#23373f;--ink:#eef8f9;--muted:#91a8af;--cyan:#00c2d8;--teal:#21d0a2;--amber:#ffbd66;--red:#ff7482}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button{font:inherit;color:inherit}.shell{min-height:100vh}.top{position:sticky;top:0;z-index:5;background:#071014ef;border-bottom:1px solid var(--line);backdrop-filter:blur(14px)}.topin{max-width:1400px;margin:auto;padding:12px 22px;display:flex;align-items:center;gap:18px}.brand{font-weight:800;white-space:nowrap}.brand span{color:var(--cyan)}nav{display:flex;gap:5px;overflow:auto}nav button,.tabs button{border:1px solid transparent;background:transparent;border-radius:6px;padding:8px 11px;white-space:nowrap;cursor:pointer}nav button.active,.tabs button.active{border-color:var(--cyan);background:#0e252c}.date{margin-left:auto;color:var(--muted);font:11px ui-monospace;white-space:nowrap}.main{max-width:1400px;margin:auto;padding:34px 22px 70px}.view{display:none}.view.active{display:block}.hero{display:flex;justify-content:space-between;gap:28px;align-items:flex-start;margin-bottom:24px}.hero h1{font-size:clamp(34px,5vw,64px);line-height:1.02;letter-spacing:-.045em;max-width:1050px;margin:8px 0 13px}.hero p{color:var(--muted);font-size:17px;max-width:850px;margin:0}.eyebrow{font:11px ui-monospace;color:var(--cyan);letter-spacing:.1em}.badge,.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 9px;color:#b7c9ce;font:11px ui-monospace}.pill.cyan{border-color:#176d78;color:var(--cyan)}.tabs{display:flex;gap:8px;margin:0 0 18px}.tabs button{border-color:var(--line)}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.metric,.panel,.mini{border:1px solid var(--line);background:var(--panel);border-radius:8px}.metric{padding:17px}.metric span{display:block;color:var(--muted);font-size:12px}.metric b{display:block;font-size:27px;letter-spacing:-.03em;margin:4px 0}.metric small{color:#b5c7cc}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.panel{padding:18px;margin-bottom:14px}.panel h2{font-size:18px;margin:0 0 14px}.panel h3{margin:14px 0 6px}.panel p,.panel li{color:#b7c8cd}.panel ul{padding-left:20px}.barrow{display:grid;grid-template-columns:145px 1fr 60px;gap:9px;align-items:center;margin:10px 0;font-size:12px}.track{height:7px;background:#1a2c33;border-radius:9px;overflow:hidden}.fill{height:100%;background:var(--cyan);border-radius:9px}.fill.teal{background:var(--teal)}.fill.amber{background:var(--amber)}.num{text-align:right;font-variant-numeric:tabular-nums}.tablewrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:780px}th,td{text-align:left;padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:top}th{color:var(--muted);font:10px ui-monospace;text-transform:uppercase;letter-spacing:.07em}td{color:#bfd0d4}.callout{border-left:3px solid var(--cyan);background:#0d2026;padding:14px 16px;margin:14px 0;color:#bed0d4}.callout.warn{border-color:var(--amber)}a{color:var(--cyan)}.source{display:grid;grid-template-columns:220px 1fr auto;align-items:center;gap:20px}.foot{margin-top:26px;padding-top:18px;border-top:1px solid var(--line);color:var(--muted);font-size:12px}

</style></head><body><div class="shell"><header class="top"><div class="topin"><div class="brand"><span>NQ</span> Business Architecture</div><nav id="nav"></nav><div class="date">FY2025 · Q1 2026</div></div></header><main class="main"><section id="business" class="view active"></section><section id="strategy" class="view"></section><section id="digital" class="view"></section><section id="sources" class="view"></section><div class="foot">Independent primary-source analysis using Nasdaq filings, earnings materials and the 2026 Investor Day. Figures are not investment advice. Product-level margins and Digital Assets revenue are not publicly disclosed.</div></main></div><script>
const D={"segments2025": [{"name": "Capital Access Platforms", "revenue": 2137, "mix": 40.71, "op": 1274, "margin": 59.62, "profitMix": 43.96, "growth": 9.9, "arr": 1340, "role": "Current profit + proprietary data/IP engine"}, {"name": "Financial Technology", "revenue": 1850, "mix": 35.24, "op": 860, "margin": 46.49, "profitMix": 29.68, "growth": 14.1, "arr": 1711, "role": "Priority recurring-growth + cross-sell engine"}, {"name": "Market Services", "revenue": 1201, "mix": 22.88, "op": 764, "margin": 63.61, "profitMix": 26.36, "growth": 17.7, "arr": null, "role": "Highest-margin infrastructure + liquidity flywheel"}, {"name": "Corporate / Other", "revenue": 61, "mix": 1.16, "op": -567, "margin": null, "profitMix": null, "growth": -4.1, "arr": null, "role": "Divestitures and centrally assigned costs"}], "q1": [{"name": "Capital Access Platforms", "revenue": 565, "mix": 40.16, "growth": 11.2, "op": 349, "margin": 61.8, "profitMix": 43.7}, {"name": "Financial Technology", "revenue": 517, "mix": 36.74, "growth": 19.7, "op": 245, "margin": 47.4, "profitMix": 30.7}, {"name": "Market Services", "revenue": 317, "mix": 22.53, "growth": 12.8, "op": 201, "margin": 63.4, "profitMix": 25.2}, {"name": "Other", "revenue": 8, "mix": 0.57, "growth": -50, "op": 4, "margin": 50.0, "profitMix": 0.5}], "verticals": [["Capital Markets Technology", 1091, 20.78, 9.5, "$975M", "High single–low double", "Enterprise software, cloud/managed services, implementation"], ["Index", 827, 15.76, 17.1, "$81M", "High single–mid teens", "AUM/volume licensing, minimums, index data"], ["Data & Listing Services", 804, 15.32, 6.7, "$764M", "Low–mid single", "Market-data subscriptions, enterprise licenses, listing fees"], ["Cash Equity Trading", 515, 9.81, 19.9, "N/D", "No formal target", "Execution/auction fees net of rebates and clearance"], ["Workflow & Insights", 506, 9.64, 4.4, "$495M", "Mid–high single", "Corporate and investment-intelligence subscriptions/SaaS"], ["U.S. Equity Derivatives", 463, 8.82, 17.2, "N/D", "No formal target", "Per-contract execution net of rebates/clearance"], ["Regulatory Technology", 428, 8.15, 21.5, "$407M", "High single–low double", "AxiomSL and Surveillance subscriptions, cloud, services"], ["Financial Crime Management", 331, 6.31, 21.5, "$329M", "Mid-20s", "Verafin SaaS, consortium data, professional services"], ["U.S. Tape Plans", 139, 2.65, 11.1, "N/D", "No formal target", "Consolidated market-data plan allocation"], ["Other Market Services", 84, 1.6, 18.9, "N/D", "No formal target", "Nordic fixed income/derivatives and Canadian equities"], ["Corporate / Other", 61, 1.16, -4.1, "N/D", "Non-strategic", "Divested and wind-down businesses"]], "priorities": [["1", "Financial Technology / One Nasdaq", "Highest target growth; only 7% of $28B management-estimated SAM; 80% of growth from upsell/cross-sell", "10–14% medium-term organic growth"], ["2", "Capital Access Platforms / Index + Data", "Largest revenue and profit pool; proprietary data and issuer/investor network feed the platform", "$2.137B revenue; $1.274B operating income"], ["3", "Market Services / Always-On", "Highest margin; liquidity, data, trust, and market infrastructure create the corporate flywheel", "63.6% margin; 23/5 and tokenization option"], ["4", "AI + Intelligence Layers", "Unifies acquired systems and proprietary data; creates agentic workflow products and operating leverage", "$100M run-rate expense efficiency target by YE2027"], ["5", "Private markets", "Extends eVestment, data distribution and index economics into opaque, faster-growing markets", "Private capital indexes + data partnerships"], ["6", "Digital assets + tokenization", "Cross-division transform vector; expands CMT, Market Services, Surveillance, Index and collateral TAM", "$3B–$6B 2030 market opportunity; not revenue guidance"]], "expansion": [{"level": "EXPAND", "job": "Capture current SAM", "moves": ["New logos and geographies", "Enterprise upsells", "One Nasdaq cross-sell", "Index institutional/international distribution"], "proof": ["$45M cross-sell run-rate at YE2025", "$100M+ target by exit 2027", "50% additional cross-sell whitespace in top 300 FinTech clients"]}, {"level": "EVOLVE", "job": "Convert TAM into serviceable products", "moves": ["Cloud and managed services", "Shared Intelligence Layers", "AI embedded in workflows", "Strategic partner acceleration"], "proof": ["80% of Q1 2026 FinTech ACV bookings cloud-based", "Unify AxiomSL, Calypso, Surveillance, Verafin and Market Tech data", "AI agents across crime, reporting, surveillance and post-trade"]}, {"level": "TRANSFORM", "job": "Create new addressable markets", "moves": ["23/5 then Always-On markets", "Tokenized issuance, registry and settlement", "24/7 collateral and real-time payments", "Private-market data and indexes"], "proof": ["23/5 planned for Dec. 6, 2026", "Tokenized equity settlement approved but not yet scaled", "$3B–$6B 2030 market opportunity is an estimate, not guidance"]}], "gaps": [["Wallet share", "Half of current FinTech solution opportunity remains among top 300 clients", "Recurring cross-sell ARR and higher retention"], ["Enterprise/global Verafin", "Strong North American SMB base; early Tier-1 Europe proof", "Mid-20s growth and stronger consortium network effects"], ["Cloud delivery", "Mixed on-premise, subscription and cloud estate", "Faster deployment, managed revenue, scalable support"], ["Product fragmentation", "Separate acquired and legacy systems/data", "Unified data, cross-product insights and lower implementation friction"], ["AI trust and adoption", "Precision, security and regulation constrain adoption", "Governed agents embedded in mission-critical workflows"], ["Index distribution", "Strong Nasdaq-100 base but room across institution, insurance and geography", "AUM/volume-linked licensing growth"], ["Private-market transparency", "Opaque and fragmented data", "Data subscriptions, benchmarks and distribution partnerships"], ["Always-On operations", "Batch windows and fragmented collateral/settlement", "New transaction, software, surveillance and connectivity revenue"], ["Tokenization interoperability", "Parallel rails, fragmented liquidity and uncertain controls", "Regulated traditional/digital integration across Nasdaq products"]], "digital": [["Capital Markets Technology", "Direct / near-direct", "Issuance, registry, settlement, trading/clearing, collateral, custody technology and managed services", "Signed ACV, launch gates, time-to-production, expansion ARR"], ["Regulatory Technology", "Direct-to-adjacent", "Embed Surveillance and reporting in digital-asset and always-on workflows", "Attach rate, new/upsell ACV, alerts/control coverage"], ["Market Services", "Strategic; potentially direct later", "23/5, tokenized securities, issuers, liquidity, settlement and payment partners", "Launch readiness, liquidity, retained net revenue—not gross volume alone"], ["Index", "Adjacent", "Digital-asset indexes, options/ETPs and institutional distribution", "Products launched, licensed AUM, volume-based revenue"], ["Data & Listings", "Adjacent", "Tokenized issuer relationships, market data and global access", "Subscriptions, issuers, entitlements; attribution must be explicit"], ["Financial Crime Management", "Indirect", "AML, fraud and sanctions around real-time/tokenized flows", "Qualified product pull-through; separate Verafin ownership"]], "sources": [["2025 Form 10-K", "Audited revenue, product detail, ARR and segment profit", "https://ir.nasdaq.com/node/109956/html"], ["2026 Investor Day", "Strategy, margins, TAM/SAM, medium-term targets and Digital Assets architecture", "https://ir.nasdaq.com/static-files/c12ab670-b5d2-40a3-a58a-35b96bd4d966"], ["FY2025 results", "Full-year and Q4 financial/operating updates", "https://ir.nasdaq.com/news-releases/news-release-details/nasdaq-reports-fourth-quarter-and-full-year-2025-results-annual"], ["Q1 2026 results", "Latest revenue, ARR, bookings and strategic updates", "https://ir.nasdaq.com/news-releases/news-release-details/nasdaq-reports-first-quarter-2026-results-strong-execution"], ["Q1 2026 Form 10-Q", "Filed segment operating income, Corporate reconciliation and margins", "https://www.sec.gov/Archives/edgar/data/1120193/000162828026027105/ndaq-20260331.htm"]]};let period='FY2025';const views=[['business','Business model'],['strategy','Strategy & gaps'],['digital','Digital Assets'],['sources','Sources']];const money=x=>x<0?`($${Math.abs(x).toLocaleString()}M)`:`$${x.toLocaleString()}M`;const metric=(a,b,c)=>`<div class="metric"><span>${a}</span><b>${b}</b><small>${c}</small></div>`;const bars=(r,k='mix',tone='')=>r.map(x=>`<div class="barrow"><span>${x.name}</span><div class="track"><div class="fill ${tone}" style="width:${Math.max(0,x[k])}%"></div></div><b class="num">${x[k].toFixed(1)}%</b></div>`).join('');
function show(v){document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active',x.id===v));document.querySelectorAll('[data-view]').forEach(x=>x.classList.toggle('active',x.dataset.view===v));({business:business,strategy:strategy,digital:digital,sources:sources}[v])();scrollTo(0,0)}
document.getElementById('nav').innerHTML=views.map(([v,l])=>`<button data-view="${v}">${l}</button>`).join('');document.querySelectorAll('[data-view]').forEach(x=>x.onclick=()=>show(x.dataset.view));
function business(){let annual=period==='FY2025',rows=annual?D.segments2025:D.q1;document.getElementById('business').innerHTML=`<div class="hero"><div><div class="eyebrow">PRIMARY-SOURCE ECONOMIC MODEL</div><h1>Nasdaq is a data, software and market-infrastructure compounder—not just an exchange.</h1><p>Net revenue after transaction-based expenses is the meaningful comparison. FY2025 provides the audited base; Q1 2026 shows the latest filed profitability and momentum.</p></div></div><div class="tabs"><button data-period="FY2025" class="${annual?'active':''}">FY2025 audited</button><button data-period="Q1 2026" class="${!annual?'active':''}">Q1 2026 filed</button></div>${annual?`<div class="metrics">${metric('Net revenue','$5.249B','after $3.013B transaction costs')}${metric('GAAP operating income','$2.331B','44.4% margin')}${metric('Three-division profit','$2.898B','before Corporate loss')}${metric('ARR','$3.051B','$1.149B annualized SaaS')}</div>`:`<div class="metrics">${metric('Net revenue','$1.407B','+13.7% YoY')}${metric('GAAP operating income','$657M','46.7% margin')}${metric('Non-GAAP operating income','$799M','56.8% margin')}${metric('ARR','$3.188B','$1.202B annualized SaaS')}</div>`}<div class="grid3"><div class="panel"><h2>Revenue mix</h2>${bars(rows)}</div><div class="panel"><h2>Segment margins</h2>${bars(rows.map(x=>({...x,v:x.margin||0})),'v','teal')}</div><div class="panel"><h2>${annual?'Three-division profit share':'Non-GAAP profit share'}</h2>${bars(rows.filter(x=>x.profitMix!=null),'profitMix','amber')}</div></div>${annual?`<div class="panel"><h2>Market Services: gross-to-net</h2><div class="metrics">${metric('Gross revenue','$4.214B','includes pass-through economics')}${metric('Transaction expenses','$(3.013B)','rebates, brokerage and clearing')}${metric('Retained net revenue','$1.201B','28.5% gross-to-net capture')}${metric('Segment margin','63.6%','highest disclosed margin')}</div></div><div class="panel"><h2>Non-overlapping product verticals</h2><div class="tablewrap"><table><thead><tr><th>Vertical</th><th>Revenue</th><th>Company mix</th><th>Growth</th><th>ARR</th><th>Outlook</th><th>Monetization</th></tr></thead><tbody>${D.verticals.map(v=>`<tr><td><b>${v[0]}</b></td><td>${money(v[1])}</td><td>${v[2].toFixed(1)}%</td><td>${v[3].toFixed(1)}%</td><td>${v[4]}</td><td>${v[5]}</td><td>${v[6]}</td></tr>`).join('')}</tbody></table></div><div class="callout warn"><b>Disclosure boundary:</b> Nasdaq reports profit at the three-segment level. Product-level profit for Index, Verafin, Calypso, AxiomSL, Surveillance and individual trading products is not disclosed.</div></div>`:`<div class="callout"><b>Q1 signal:</b> Financial Technology revenue grew 19.7%; its operating income reached $245M and its margin was 47.4%. Market Services remained the highest-margin segment at 63.4%.</div>`}`;document.querySelectorAll('[data-period]').forEach(x=>x.onclick=()=>{period=x.dataset.period;business()})}
function strategy(){document.getElementById('strategy').innerHTML=`<div class="hero"><div><div class="eyebrow">2026 INVESTOR DAY</div><h1>The nearest money is installed-base cross-sell. The largest new option is Always-On infrastructure.</h1><p>Management separates execution risk into Expand, Evolve and Transform.</p></div></div><div class="panel"><h2>What matters most</h2><div class="tablewrap"><table><thead><tr><th>#</th><th>Priority</th><th>Why</th><th>Evidence</th></tr></thead><tbody>${D.priorities.map(x=>`<tr><td>${x[0]}</td><td><b>${x[1]}</b></td><td>${x[2]}</td><td>${x[3]}</td></tr>`).join('')}</tbody></table></div></div><div class="grid3">${D.expansion.map((x,i)=>`<div class="panel"><span class="pill cyan">${x.level}</span><h2>${x.job}</h2><h3>Moves</h3><ul>${x.moves.map(y=>`<li>${y}</li>`).join('')}</ul><h3>Proof and targets</h3><ul>${x.proof.map(y=>`<li>${y}</li>`).join('')}</ul></div>`).join('')}</div><div class="panel"><h2>Expansion gaps</h2><div class="tablewrap"><table><thead><tr><th>Gap</th><th>Current state</th><th>Economic payoff</th></tr></thead><tbody>${D.gaps.map(x=>`<tr><td><b>${x[0]}</b></td><td>${x[1]}</td><td>${x[2]}</td></tr>`).join('')}</tbody></table></div></div>`}
function digital(){document.getElementById('digital').innerHTML=`<div class="hero"><div><div class="eyebrow">ROLE-TO-P&L ARCHITECTURE</div><h1>Digital Assets is a platform-extension strategy—not a disclosed standalone P&L.</h1><p>Tokenization and Always-On markets can create demand for Nasdaq's existing market infrastructure, risk, surveillance, data, indexes, connectivity, collateral and issuer services.</p></div></div><div class="metrics">${metric('2030 opportunity','$3B–$6B','market estimate, not revenue guidance')}${metric('Primary direct pool','Capital Markets Tech','$1.091B FY2025 revenue')}${metric('Standalone revenue','Not disclosed','no honest percentage can be assigned')}${metric('Strategic state','Transform','gated long-duration option')}</div><div class="panel"><h2>Influence by revenue pool</h2><div class="tablewrap"><table><thead><tr><th>Pool</th><th>Influence</th><th>Mechanism</th><th>Measure</th></tr></thead><tbody>${D.digital.map(x=>`<tr><td><b>${x[0]}</b></td><td><span class="pill cyan">${x[1]}</span></td><td>${x[2]}</td><td>${x[3]}</td></tr>`).join('')}</tbody></table></div></div><div class="callout warn"><b>Interpretation boundary:</b> SEC approval is not commercial adoption; partnership announcements are not recognized revenue; the $3B–$6B opportunity is not a forecast; tokenized volume is not Nasdaq net revenue.</div>`}
function sources(){document.getElementById('sources').innerHTML=`<div class="hero"><div><div class="eyebrow">SOURCE LEDGER</div><h1>Filings and Nasdaq investor materials anchor the model.</h1><p>Management targets and market-opportunity estimates remain forward-looking.</p></div></div>${D.sources.map(x=>`<div class="panel source"><h2>${x[0]}</h2><p>${x[1]}</p><a href="${x[2]}" target="_blank" rel="noreferrer">Official source ↗</a></div>`).join('')}`}
show('business');
</script></body></html>
